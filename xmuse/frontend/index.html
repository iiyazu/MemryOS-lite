<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>xmuse</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>xmuse</h1>
          <button id="new-lane-btn" class="icon-btn" title="New lane">+</button>
        </div>
        <div class="sidebar-stats" id="stats"></div>
        <div class="sidebar-search">
          <input id="search" type="search" placeholder="Search lanes..." autocomplete="off">
        </div>
        <ul id="lane-list" class="lane-list"></ul>
      </aside>
      <main class="chat-area" id="chat-area">
        <div class="chat-header" id="chat-header">
          <div class="chat-title">Select a lane</div>
          <div class="chat-meta"></div>
        </div>
        <div class="messages" id="messages">
          <div class="empty-state">Select a lane from the sidebar to view execution details</div>
        </div>
        <div class="input-bar" id="input-bar" style="display:none">
          <textarea id="msg-input" placeholder="Send a command or rework instruction..." rows="1"></textarea>
          <button id="send-btn" class="send-btn">Send</button>
        </div>
      </main>
    </div>
    <div class="modal" id="new-lane-modal" style="display:none">
      <div class="modal-content">
        <div class="modal-header">
          <h2>New Lane</h2>
          <button class="icon-btn modal-close" id="modal-close">&times;</button>
        </div>
        <form id="lane-form">
          <input name="feature_id" placeholder="Feature ID" required>
          <textarea name="prompt" placeholder="Describe what to implement..." rows="6" required></textarea>
          <input name="capabilities" placeholder="Capabilities (code, test)" value="code, test">
          <button type="submit">Create Lane</button>
        </form>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
